services:
  - type: web
    name: testlab-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: yarn install --frozen-lockfile && yarn workspace @testlab/backend build
    startCommand: yarn workspace @testlab/backend start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: testlab-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

  - type: static
    name: testlab-frontend
    rootDir: .
    buildCommand: yarn install --frozen-lockfile && yarn workspace @testlab/frontend build
    staticPublishPath: apps/frontend/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 20

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: testlab-db
    plan: free
