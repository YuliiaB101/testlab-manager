services:
  - type: web
    name: testlab-backend
    runtime: node
    plan: free
    healthCheckPath: /api/health
    rootDir: .
    buildCommand: YARN_PRODUCTION=false yarn install --frozen-lockfile && yarn workspace @testlab/backend build
    startCommand: NODE_ENV=production yarn workspace @testlab/backend start
    autoDeploy: true
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: testlab-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://testlab-frontend.onrender.com,http://localhost:5173

  - type: web
    name: testlab-frontend
    runtime: static
    rootDir: .
    buildCommand: yarn install --frozen-lockfile && yarn workspace @testlab/frontend build
    staticPublishPath: apps/frontend/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: https://testlab-backend.onrender.com/api

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: testlab-db
    plan: free
